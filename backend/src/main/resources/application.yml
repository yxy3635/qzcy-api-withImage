server:
  port: 8080

spring:
  application:
    name: imageCreater-backend
  # 默认使用 dev 环境，线上启动时通过 --spring.profiles.active=prod 覆盖
  profiles:
    active: dev
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:replace-me}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      image:
        options:
          model: dall-e-3

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: ${JWT_SECRET:imageCreater-development-secret-key-change-me-please-32}
    expiration-ms: 86400000
  upload:
    image-path: userImage/
  image:
    cost: 0.10
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    dev-return-code: true
